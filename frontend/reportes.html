<!doctype html>
<html lang="Es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Panel de Administración</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
  <!-- TOPBAR (solo visible en móvil) -->
  <div class="topbar">
    <div class="title-business">
      <span>JUANITO SAC</span>
    </div>
    <div class="btn-menu">
      <button class="hamburger" aria-label="Abrir menú">
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>
  </div>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">Dashboard</div>
    <ul>
      <li>
        <a href="index.html" data-page="home">
          <i class="fa-solid fa-house"></i>
          <span>Inicio</span>
        </a>
      </li>
      <li>
        <a href="reportes.html" class="activo" data-page="reportes">
          <i class="fa-solid fa-clu_ipboard-list"></i>
          <span>Reportes</span>
        </a>
      </li>
      <li>
        <a href="productos.html" data-page="productos">
          <i class="fa-solid fa-shop"></i>
          <span>Productos</span>
        </a>
      </li>
      <li class="nav-logout">
        <a href="#" id="btn-logout">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>Cerrar sesión</span>
        </a>
      </li>
    </ul>
  </aside>

  <!-- CONTENIDO PRINCIPAL -->
  <main>
    <nav class="breadcrumb">
      <span>Inicio</span>
      <i class="fa-solid fa-chevron-right"></i>
      <span id="breadcrumb-page">Clientes</span>
    </nav>
    <div class="main-content">
      <div class="mb-2 d-flex justify-content-between align-items-center p-3">
        <!-- Izquierda -->
        <h5 class="mb-0">REPORTE DE CLIENTES</h5>

        <!-- Derecha -->
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalRegistroCliente">REGISTRAR
        </button>
      </div>

      <!--Card-->
      <div class="row my-4">
        <div class="col-md-4">
          <div class="card border-start border-primary border-4 shadow-sm">
            <div class="card-body">
              <div class="row align-items-center">
                <div class="col">
                  <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">
                    Total de Clientes</div>
                  <div class="h2 mb-0 font-weight-bold text-gray-800" id="totalClientes">0</div>
                </div>
                <div class="col-auto">
                  <i class="fas fa-users fa-2x text-gray-300"></i>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!--Tabla que se rellena-->
      <div class="table-responsive">
        <table class="table">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>DNI</th>
              <th>Telefono</th>
              <th>Dirección</th>
              <th>Opciones</th>
            </tr>
          </thead>
          <tbody id="table-cliente"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal REGISTRO CLIENTE-->
  <div class="modal fade" id="modalRegistroCliente" tabindex="-1" aria-labelledby="exampleModalLabel"
    aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="mb-3">
              <label for="" class="form-label">Nombre</label>
              <input type="text" class="form-control" id="c_nombre" name="nombre" required />
            </div>

            <div class="mb-3">
              <label for="" class="form-label">Apellido</label>
              <input type="text" class="form-control" id="c_apellido" name="apellido" required />
            </div>

            <div class="mb-3">
              <label for="" class="form-label">DNI</label>
              <input type="text" class="form-control" id="c_dni" name="dni" required />
            </div>

            <div class="mb-3">
              <label for="" class="form-label">Teléfono</label>
              <input type="tel" class="form-control" id="c_telefono" name="telefono" required />
            </div>

            <div class="mb-3">
              <label for="" class="form-label">Dirección</label>
              <input type="text" class="form-control" id="c_direccion" name="direccion" required />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button type="button" class="btn btn-primary" id="btn-crearcliente">Guardar</button>
        </div>
      </div>
    </div>
  </div>


  <!-- Modal EDITAR-CLIENTE DE CLIENTE-->
  <div class="modal fade" id="modalEditarCliente" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form>
            <!--lo vas a necesitar cuando presiones el botón "Actualizar"
              para saber a qué cliente de la base de datos afectara. (campo oculto)
              -->
            <input type="hidden" id="c_u_id" name="id">

            <div class="mb-3">
              <label for="" class="form-label">Nombre</label>
              <input type="text" class="form-control" id="c_u_nombre" name="nombre" required />
            </div>

            <div class="mb-3">
              <label for="" class="form-label">Apellido</label>
              <input type="text" class="form-control" id="c_u_apellido" name="apellido" required />
            </div>
            <!-- el oninput limitar la cantidad de caracteres-->
            <div class="mb-3">
              <label for="" class="form-label">DNI</label>
              <input type="number" class="form-control" id="c_u_dni"
                oninput="if(this.value.length > 8) this.value = this.value.slice(0, 8);" name="dni" required/>
            </div>

            <div class="mb-3">
              <label for="" class="form-label">Teléfono</label>
              <input type="tel" class="form-control" id="c_u_telefono" name="telefono" required />
            </div>

            <div class="mb-3">
              <label for="" class="form-label">Dirección</label>
              <input type="text" class="form-control" id="c_u_direccion" name="direccion" required />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button type="button" class="btn btn-primary" id="btn-Editarcliente">Actualizar</button>
        </div>
      </div>
    </div>
  </div>





  <script src="js/main.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
